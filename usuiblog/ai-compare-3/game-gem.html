<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Simple Starship Shooter</title>
    <style>
        body { margin: 0; background: #111; color: white; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; background: #000; margin: auto; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">SCORE: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreElement = document.getElementById('score');
canvas.width = 600;
canvas.height = 400;
let score = 0;
const player = { x: 50, y: 200, size: 20, speed: 5 };
const bullets = [];
const enemies = [];
const keys = {};
window.onkeydown = (e) => keys[e.key] = true;
window.onkeyup = (e) => keys[e.key] = false;
function spawnEnemy() {
    enemies.push({ x: canvas.width, y: Math.random() * (canvas.height - 20), size: 20, speed: 2 + Math.random() * 3 });
}
function update() {
    if (keys['ArrowUp'] && player.y > 0) player.y -= player.speed;
    if (keys['ArrowDown'] && player.y < canvas.height - player.size) player.y += player.speed;
    if (keys[' ']) {
        if (bullets.length < 5) bullets.push({ x: player.x + player.size, y: player.y + player.size/2, speed: 7 });
    }
    bullets.forEach((b, i) => {
        b.x += b.speed;
        if (b.x > canvas.width) bullets.splice(i, 1);
    });
    enemies.forEach((e, i) => {
        e.x -= e.speed;
        if (e.x < -e.size) {
            enemies.splice(i, 1);
            score = Math.max(0, score - 5);
        }
        bullets.forEach((b, bi) => {
            if (b.x > e.x && b.x < e.x + e.size && b.y > e.y && b.y < e.y + e.size) {
                enemies.splice(i, 1);
                bullets.splice(bi, 1);
                score += 10;
            }
        });
    });
    scoreElement.innerText = score;
}
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#00f';
    ctx.fillRect(player.x, player.y, player.size, player.size);
    ctx.fillStyle = '#ff0';
    bullets.forEach(b => ctx.fillRect(b.x, b.y, 10, 4));
    ctx.fillStyle = '#f00';
    enemies.forEach(e => ctx.fillRect(e.x, e.y, e.size, e.size));
}
function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
setInterval(spawnEnemy, 1000);
gameLoop();
</script>
</body>
</html>
