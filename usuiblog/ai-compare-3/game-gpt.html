<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Simple Shooting Game</title>
<style>
body { margin:0; background:black; overflow:hidden; }
canvas { display:block; margin:auto; background:#111; }
#touch-ui { position:fixed; bottom:16px; left:0; right:0; display:flex; justify-content:space-between; padding:0 24px; z-index:10; pointer-events:none; }
.t-btn { pointer-events:auto; background:rgba(255,255,255,.2); border:2px solid rgba(255,255,255,.4); border-radius:50%; width:64px; height:64px; font-size:22px; color:#fff; display:flex; align-items:center; justify-content:center; user-select:none; -webkit-user-select:none; cursor:pointer; }
</style>
</head>
<body>
<canvas id="gameCanvas" width="400" height="600"></canvas>
<div id="touch-ui">
  <div class="t-btn" id="tl">◀</div>
  <div class="t-btn" id="tf">●</div>
  <div class="t-btn" id="tr">▶</div>
</div>
<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
let player = { x:180, y:550, width:40, height:20, speed:6 };
let bullets = [];
let enemies = [];
let score = 0;
let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);
function spawnEnemy(){
    enemies.push({ x:Math.random()*360, y:-20, width:30, height:20, speed:2 + Math.random()*2 });
}
setInterval(spawnEnemy, 1000);
function shoot(){
    bullets.push({ x:player.x + 18, y:player.y, speed:7 });
}
document.addEventListener("keydown", e => { if(e.key === " ") shoot(); });
function update(){
    if(keys["ArrowLeft"]) player.x -= player.speed;
    if(keys["ArrowRight"]) player.x += player.speed;
    bullets.forEach((b,i) => {
        b.y -= b.speed;
        if(b.y < 0) bullets.splice(i,1);
    });
    enemies.forEach((e,i) => {
        e.y += e.speed;
        bullets.forEach((b,j) => {
            if(b.x < e.x+e.width && b.x > e.x && b.y < e.y+e.height && b.y > e.y){
                enemies.splice(i,1);
                bullets.splice(j,1);
                score++;
            }
        });
        if(e.y > 600) enemies.splice(i,1);
    });
}
function draw(){
    ctx.clearRect(0,0,400,600);
    ctx.fillStyle="cyan";
    ctx.fillRect(player.x,player.y,player.width,player.height);
    ctx.fillStyle="yellow";
    bullets.forEach(b => { ctx.fillRect(b.x,b.y,5,10); });
    ctx.fillStyle="red";
    enemies.forEach(e => { ctx.fillRect(e.x,e.y,e.width,e.height); });
    ctx.fillStyle="white";
    ctx.font="20px Arial";
    ctx.fillText("Score: "+score,10,30);
}
function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();

// Touch controls
const tl = document.getElementById('tl'), tr = document.getElementById('tr'), tf = document.getElementById('tf');
[[tl,'ArrowLeft'],[tr,'ArrowRight'],[tf,' ']].forEach(([btn, key]) => {
  btn.addEventListener('touchstart', e => { e.preventDefault(); keys[key]=true; }, {passive:false});
  btn.addEventListener('touchend',   e => { e.preventDefault(); keys[key]=false; }, {passive:false});
});
</script>
</body>
</html>
