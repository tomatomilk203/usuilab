<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Simple Shooting Game</title>
<style>
body { margin:0; background:black; overflow:hidden; }
canvas { display:block; margin:auto; background:#111; }
</style>
</head>
<body>
<canvas id="gameCanvas" width="400" height="600"></canvas>
<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
let player = { x:180, y:550, width:40, height:20, speed:6 };
let bullets = [];
let enemies = [];
let score = 0;
let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);
function spawnEnemy(){
    enemies.push({ x:Math.random()*360, y:-20, width:30, height:20, speed:2 + Math.random()*2 });
}
setInterval(spawnEnemy, 1000);
function shoot(){
    bullets.push({ x:player.x + 18, y:player.y, speed:7 });
}
document.addEventListener("keydown", e => { if(e.key === " ") shoot(); });
function update(){
    if(keys["ArrowLeft"]) player.x -= player.speed;
    if(keys["ArrowRight"]) player.x += player.speed;
    bullets.forEach((b,i) => {
        b.y -= b.speed;
        if(b.y < 0) bullets.splice(i,1);
    });
    enemies.forEach((e,i) => {
        e.y += e.speed;
        bullets.forEach((b,j) => {
            if(b.x < e.x+e.width && b.x > e.x && b.y < e.y+e.height && b.y > e.y){
                enemies.splice(i,1);
                bullets.splice(j,1);
                score++;
            }
        });
        if(e.y > 600) enemies.splice(i,1);
    });
}
function draw(){
    ctx.clearRect(0,0,400,600);
    ctx.fillStyle="cyan";
    ctx.fillRect(player.x,player.y,player.width,player.height);
    ctx.fillStyle="yellow";
    bullets.forEach(b => { ctx.fillRect(b.x,b.y,5,10); });
    ctx.fillStyle="red";
    enemies.forEach(e => { ctx.fillRect(e.x,e.y,e.width,e.height); });
    ctx.fillStyle="white";
    ctx.font="20px Arial";
    ctx.fillText("Score: "+score,10,30);
}
function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
